# Titanium SDK ProGuard/R8 keep rules.
#
# These rules are automatically applied in front of the app project's
# "platform/android/proguard.cfg" file when minification is enabled.
#
# The native V8/Kroll runtime resolves Java classes, methods and fields by
# name via JNI and reflection (see "android/runtime/v8/src/native/JNIUtil.cpp"
# and the kroll-apt generated bindings), so they must not be renamed or removed.

-keepattributes *Annotation*,Signature,InnerClasses,EnclosingMethod

# Titanium SDK classes and the generated Kroll proxy bindings.
-keep class org.appcelerator.** { *; }
-keep interface org.appcelerator.** { *; }
-keep class ti.modules.** { *; }
-keep interface ti.modules.** { *; }

# Kroll proxies and modules of native Titanium modules live in their own
# packages, but always derive from these base types and are resolved by name
# through their generated C++ bindings.
-keep class * extends org.appcelerator.kroll.KrollProxy { *; }
-keep class * implements org.appcelerator.kroll.KrollExternalModule { *; }

# Keep methods registered with or called from native code.
-keepclasseswithmembers,includedescriptorclasses class * {
	native <methods>;
}

-dontwarn org.appcelerator.**
-dontwarn ti.modules.**

# slf4j-api is pulled in transitively without an Android logger binding.
# Its binding classes are looked up defensively at runtime, so the missing
# implementation is expected and safe to ignore.
-dontwarn org.slf4j.**
